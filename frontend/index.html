<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificador de Fatos</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="container">
        <h1>Verificador de Fatos</h1>
        <p>Envie uma afirmação e veja se já existe verificação ou se o modelo estima a veracidade.</p>

        <form id="claim-form">
            <label for="claim">Afirmação</label>
            <textarea id="claim" rows="5" placeholder="Digite a afirmação aqui..."></textarea>
            <button id="analyze-button" type="submit">Analisar</button>
        </form>

        <section id="result" class="hidden">
            <h2>Resultado</h2>
            <p><strong>Afirmação:</strong> <span id="result-claim"></span></p>
            <p><strong>Fonte:</strong> <span id="result-source"></span></p>
            <p><strong>Veredicto:</strong> <span id="result-verdict"></span></p>
            <p><strong>Confiança:</strong> <span id="result-probability"></span></p>
            <p><strong>Detalhe:</strong> <span id="result-detail"></span></p>
            <p id="result-url-row" class="hidden"><strong>Notícia:</strong> <a id="result-url" href="#" target="_blank" rel="noopener noreferrer"></a></p>
        </section>

        <div id="error" class="error hidden"></div>
    </main>
<script src="app.js?v=3" defer></script>
</body>
</html>
